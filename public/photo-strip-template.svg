<svg width="600" height="3200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink gradient for border -->
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Light pink background -->
    <linearGradient id="lightPinkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdf2f8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text shadow filter -->
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#ec4899" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Outer border with gradient -->
  <rect width="600" height="3200" fill="url(#pinkGradient)" rx="10"/>
  
  <!-- Inner background -->
  <rect x="20" y="20" width="560" height="3160" fill="url(#lightPinkBg)" rx="8"/>
  
  <!-- Photo frame 1 -->
  <rect x="40" y="40" width="520" height="700" fill="#e5e7eb" rx="4" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Separator line 1 -->
  <line x1="40" y1="750" x2="560" y2="750" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Photo frame 2 -->
  <rect x="40" y="760" width="520" height="700" fill="#e5e7eb" rx="4" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Separator line 2 -->
  <line x1="40" y1="1470" x2="560" y2="1470" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Photo frame 3 -->
  <rect x="40" y="1480" width="520" height="700" fill="#e5e7eb" rx="4" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Separator line 3 -->
  <line x1="40" y1="2190" x2="560" y2="2190" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Photo frame 4 -->
  <rect x="40" y="2200" width="520" height="700" fill="#e5e7eb" rx="4" stroke="#f472b6" stroke-width="2"/>
  
  <!-- Branding area -->
  <g transform="translate(300, 2950)">
    <!-- PRISM text -->
    <text 
      x="0" 
      y="0" 
      font-family="Arial, sans-serif" 
      font-size="48" 
      font-weight="bold" 
      fill="white" 
      text-anchor="middle"
      filter="url(#textShadow)"
      style="text-shadow: 2px 2px 4px rgba(236, 72, 153, 0.8);">
      PRISM
    </text>
    
    <!-- Photo text (script style) -->
    <text 
      x="0" 
      y="50" 
      font-family="Georgia, serif" 
      font-size="36" 
      font-style="italic" 
      fill="white" 
      text-anchor="middle"
      filter="url(#textShadow)"
      style="text-shadow: 2px 2px 4px rgba(236, 72, 153, 0.8);">
      Photo
    </text>
  </g>
</svg>



